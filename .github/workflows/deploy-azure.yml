name: Projex Enterprise Cloud Deployment (Azure)

on:
  push:
    branches: [ main ] # Dispara o build na nuvem sempre que você der 'git push'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Código Mestre
      uses: actions/checkout@v4

    # 1. Autenticação Criptografada na Nuvem Azure
    - name: Azure Login Contido
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 2. Compilação remota do Dockerfile DENTRO do Azure Registry (Sem usar sua CPU)
    - name: Build Docker Remoto na Nuvem
      run: |
        az acr build --registry projexregistry --image projex-security-ia:v4 .

    # 3. Sincronização Declarativa com o Cluster Kubernetes (AKS)
    - name: Atualizar Cluster AKS Enterprise
      run: |
        az aks get-credentials --resource-group Projex-RG --name Projex-Cluster
        kubectl apply -f k8s-apps/
