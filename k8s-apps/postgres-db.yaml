apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: core-services
type: Opaque
stringData:
  postgres-user: projex_admin
  postgres-password: ProjexSecurePassword2026!
  postgres-db: projex_portal_db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: core-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    with:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: core-services
  labels:
    app: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        # 👇 ATIVANDO A AUDITORIA INTERNA NÍVEL APPLE
        args:
          - "postgres"
          - "-c"
          - "shared_preload_libraries=pgaudit"
          - "-c"
          - "pgaudit.log=read, write, ddl" # Registra leituras, escritas e alterações de tabelas
          - "-c"
          - "pgaudit.log_client=on"
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-db
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: core-services
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres-db
