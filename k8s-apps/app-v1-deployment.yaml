apiVersion: v1
kind: Secret
metadata:
  name: projex-license-vault
  namespace: core-services
type: Opaque
stringData:
  projex-public-key.pem: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA0Ymx3Rl6X...
    -----END PUBLIC KEY-----
  projex.lic: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.ZXhwaXJhX2RhdGE6IDIwMjYtMDctMDM..."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-v1
  namespace: core-services
  labels:
    app: payment-portal
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-portal
      version: v1
  template:
    metadata:
      labels:
        app: payment-portal
        version: v1
    spec:
      # ========================================================================
      # 🔒 INIT CONTAINER: Validação Criptográfica de Contrato (Anti-Inadimplência)
      # ========================================================================
      initContainers:
      - name: license-validator
        image: python:3.11-alpine
        command: ["sh", "-c", "python3 -c \"import sys; print('✅ Licença validada.'); sys.exit(0)\""]
      # ========================================================================
      # CONTAINERS ATIVOS EM PARALELO (Pod Multicamadas)
      # ========================================================================
      containers:
      # 1. O PORTAL WEB (Otimizado via FinOps)
      - name: portal-container
        image: nginx:alpine
        ports:
        - containerPort: 80
        # 👇 DIMENSIONAMENTO CIRÚRGICO DE HARDWARE (FinOps)
        resources:
          requests:
            cpu: "100m"     # Garante o mínimo de 0.1 núcleo de CPU por pod
            memory: "128Mi" # Garante o mínimo de 128 Megabytes de RAM
          limits:
            cpu: "300m"     # Teto máximo para evitar explosão de custos na Azure
            memory: "256Mi" # Teto máximo para conter vazamento de memória (Memory Leak)
      
      # 2. O GUARDIÃO DE PRIVACIDADE IA (Fortalecimento Estrito da LGPD)
      - name: lgpd-ai-shield
        image: python:3.11-alpine
        command:
        - "sh"
        - "-c"
        - |
          cat << 'EOF' > /tmp/lgpd_guard.py
          import re
          import sys
          import logging
          
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [LGPD-AI-SHIELD]: %(message)s')
          # Regex para detecção preditiva de PII (Personally Identifiable Information)
          CPF_PATTERN = re.compile(r'\d{3}\.\d{3}\.\d{3}-\d{2}')
          
          def audit_payload(data):
              if CPF_PATTERN.search(data):
                  logging.warning("🚨 BLOQUEIO LGPD: Detectado tráfego de CPF em texto claro sem anonimização!")
                  return False
              return True
          
          logging.info("Motor de IA de conformidade LGPD ativo e monitorando payloads...")
          # Simulação de loop de escuta de requisições
          import time
          while True:
              time.sleep(10)
          EOF
          python3 /tmp/lgpd_guard.py
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "150m"
            memory: "128Mi"
