apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-v1
  namespace: core-services
  labels:
    app: payment-portal
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-portal
      version: v1
  template:
    metadata:
      labels:
        app: payment-portal
        version: v1
    spec:
      containers:
      - name: portal-container
        image: nginx:alpine
        ports:
        - containerPort: 80
        # 👇 CONEXÃO BLINDADA COM O BANCO DE DADOS
        env:
        - name: DB_HOST
          value: "postgres-service.core-services.svc.cluster.local" # Endereço DNS interno do banco
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
